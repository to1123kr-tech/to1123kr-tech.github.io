
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>브이월드 토지 지도 뷰어</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>

<style>
body {
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}
#map {
    width:100%;
    height:100vh;
}
.panel {
    position:absolute;
    top:15px;
    left:15px;
    z-index:1000;
    background:#0f1b2e;
    color:white;
    padding:15px;
    border-radius:10px;
    width:260px;
}
.panel input{
    width:100%;
    padding:8px;
    margin-top:5px;
}
.panel button{
    margin-top:8px;
    width:100%;
    padding:8px;
}
.title{
    font-size:18px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="panel">
<div class="title">브이월드 지도</div>

<div>VWorld API Key</div>
<input id="apikey" placeholder="여기에 API 키 입력">

<div style="margin-top:10px;">지번 검색</div>
<input id="addr" placeholder="예: 서울 중구 세종대로 110">

<button onclick="search()">위치 찾기</button>

</div>

<div id="map"></div>

<script>

var map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: "https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png"
      })
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([127,37.5]),
    zoom: 7
  })
});


function search(){

let key=document.getElementById("apikey").value;
let addr=document.getElementById("addr").value;

let url="https://api.vworld.kr/req/address?service=address&request=getcoord&version=2.0&crs=epsg:4326&type=PARCEL&address="+encodeURIComponent(addr)+"&key="+key;

fetch(url)
.then(res=>res.json())
.then(data=>{

let x=data.response.result.point.x;
let y=data.response.result.point.y;

let coord=ol.proj.fromLonLat([x,y]);

map.getView().animate({
center:coord,
zoom:18
});

})
.catch(err=>{
alert("검색 실패");
console.log(err);
});

}

</script>

</body>
</html>
